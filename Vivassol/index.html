<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vivassol Gerencial</title>
    <meta
      name="description"
      content="Sistema gerencial Vivassol para vendas, estoque, clientes, producao, financeiro e integracoes futuras."
    >
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div id="loginScreen" class="login-screen">
      <section class="login-card" aria-labelledby="loginTitle">
        <div class="brand-mark" aria-hidden="true">
          <span class="sun-core"></span>
        </div>
        <div class="login-heading">
          <p class="eyebrow">Vivassol</p>
          <h1 id="loginTitle">Gerencial</h1>
          <p>Vendas, estoque, producao e financeiro em um unico lugar.</p>
        </div>

        <form id="loginForm" class="form-grid" autocomplete="off">
          <label>
            Usuario
            <input id="loginUser" name="usuario" type="text" placeholder="Digite seu usuario" autocomplete="off" autocapitalize="none" spellcheck="false" required>
          </label>
          <label>
            Senha
            <input id="loginPassword" name="senha" type="password" placeholder="Digite sua senha" autocomplete="current-password" required>
          </label>
          <label class="inline-check">
            <input id="trustedDevice" type="checkbox">
            <span>Confiar neste dispositivo</span>
          </label>
          <button class="primary-button" type="submit">
            <span class="btn-icon">-></span>
            Entrar
          </button>
          <p id="loginMessage" class="form-message" role="alert"></p>
        </form>
      </section>
    </div>

    <div id="appShell" class="app-shell hidden">
      <aside id="sidebar" class="sidebar" aria-label="Menu principal">
        <div class="sidebar-brand">
          <div class="brand-mark small" aria-hidden="true"><span class="sun-core"></span></div>
          <div>
            <strong>Vivassol</strong>
            <span>Gerencial</span>
          </div>
        </div>
        <nav id="mainNav" class="main-nav"></nav>
        <div class="sidebar-footer">
          <button id="themeToggle" class="ghost-button" type="button">
            <span class="btn-icon">◐</span>
            Tema
          </button>
          <button id="logoutButton" class="ghost-button" type="button">
            <span class="btn-icon">x</span>
            Sair
          </button>
        </div>
      </aside>

      <div class="main-area">
        <header class="topbar">
          <button id="menuToggle" class="icon-button menu-toggle" type="button" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div>
            <p id="viewEyebrow" class="eyebrow">Dashboard</p>
            <h2 id="viewTitle">Painel inicial</h2>
          </div>
          <div class="topbar-actions">
            <span id="syncStatus" class="status-pill danger" title="Aguardando configuracao do Apps Script">
              <span class="status-dot"></span>
              Banco de dados desconectado
            </span>
            <span id="userBadge" class="user-badge"></span>
          </div>
        </header>

        <main id="appContent" class="content" tabindex="-1"></main>
      </div>

      <nav id="mobileNav" class="mobile-nav" aria-label="Menu mobile"></nav>
    </div>

    <div id="modalRoot" class="modal-root" aria-live="polite"></div>
    <div id="toastRoot" class="toast-root" aria-live="polite"></div>

    <script src="./app.js?v=20260530-7"></script>
  </body>
</html>
